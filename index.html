<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador GNC</title>
  <style>
    body { font-family: sans-serif; background: #f4f4f9; padding: 20px; margin: 0; text-align: center; }
    h1 { color: #1a365d; font-size: 1.5rem; margin-bottom: 20px; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; text-decoration: none; cursor: pointer; box-sizing: border-box; margin-top: 10px; }
    .btn-waze { background: #33ccff; color: #000; }
    .btn-maps { background: #ea4335; color: white; }
    .btn-enargas { background: #1a365d; color: white; }
    p { color: #4a5568; font-size: 0.95rem; line-height: 1.4; }
  </style>
</head>
<body>

  <h1>⛽ Buscador Directo de GNC</h1>

  <div class="card">
    <h3>🚗 Estaciones Cercanas</h3>
    <p>Elegí con qué app querés navegar hacia las estaciones de GNC más próximas a tu ubicación:</p>
    
    <!-- Botón Waze -->
    <a id="linkWaze" class="btn btn-waze" href="https://waze.com/ul?q=GNC&navigate=yes" target="_blank">🚙 Abrir en Waze</a>
    
    <!-- Botón Google Maps -->
    <a id="linkMaps" class="btn btn-maps" href="https://www.google.com/maps/search/estacion+de+servicio+gnc/" target="_blank">📍 Abrir en Google Maps</a>
  </div>

  <div class="card">
    <h3>🏛️ Consulta Oficial ENARGAS</h3>
    <p>Visualizador mapa georreferenciado oficial:</p>
    <a class="btn btn-enargas" href="https://sig.enargas.gov.ar/arcgis/apps/webappviewer/index.html?id=235b8f13743f4763b349eb2be4528c46" target="_blank">🗺️ Abrir Mapa ENARGAS</a>
  </div>

  <script>
    // Detecta coordenadas GPS para refinar la búsqueda exacta en ambas apps
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        document.getElementById('linkWaze').href = `https://waze.com/ul?ll=${lat},${lon}&q=GNC&navigate=yes`;
        document.getElementById('linkMaps').href = `https://www.google.com/maps/search/estacion+de+servicio+gnc/@${lat},${lon},14z`;
      });
    }
  </script>
</body>
</html>
