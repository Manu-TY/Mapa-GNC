<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GNC Oficial - ENARGAS</title>
  <style>
    body { font-family: sans-serif; background: #f4f4f9; padding: 15px; margin: 0; }
    h1 { text-align: center; color: #1a365d; font-size: 1.3rem; margin-bottom: 15px; }
    .btn-buscar { display: block; width: 100%; padding: 15px; background: #0070f3; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
    .estacion { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .estacion h3 { margin: 0 0 5px 0; color: #1a365d; font-size: 1.1rem; }
    .estacion p { margin: 4px 0; color: #4a5568; font-size: 0.95rem; }
    .distancia { font-weight: bold; color: #e53e3e; }
    .acciones { display: flex; gap: 10px; margin-top: 12px; }
    .btn-nav { flex: 1; text-align: center; padding: 12px 0; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 0.95rem; }
    .btn-waze { background: #33ccff; color: #000; }
    .btn-maps { background: #ea4335; color: #fff; }
  </style>
</head>
<body>

  <h1>⛽ Estaciones GNC - Registro ENARGAS</h1>
  <button class="btn-buscar" onclick="obtenerUbicacion()">🔍 Buscar Estaciones ENARGAS Cercanas</button>

  <div id="resultados"></div>

  <script>
    function obtenerUbicacion() {
      const contenedor = document.getElementById('resultados');
      contenedor.innerHTML = "<p style='text-align:center;'>Obteniendo tu posición GPS...</p>";

      if (!navigator.geolocation) {
        contenedor.innerHTML = "<p>Tu navegador no soporta geolocalización.</p>";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          consultarEnargas(pos.coords.latitude, pos.coords.longitude);
        },
        () => {
          contenedor.innerHTML = "<p style='text-align:center;'>Error al obtener GPS. Activa la ubicación en tu celular.</p>";
        }
      );
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    async function consultarEnargas(latUser, lonUser) {
      const contenedor = document.getElementById('resultados');
      contenedor.innerHTML = "<p style='text-align:center;'>Consultando base oficial de ENARGAS...</p>";

      // Definimos un recuadro (envelope) aproximado de ~8km alrededor de tu posición actual
      const delta = 0.08; 
      const minLon = lonUser - delta;
      const minLat = latUser - delta;
      const maxLon = lonUser + delta;
      const maxLat = latUser + delta;

      // URL del servidor ArcGIS oficial de ENARGAS (Capa GNC)
      const urlEnargas = `https://sig.enargas.gov.ar/arcgis/rest/services/Publico/GNC/MapServer/0/query?geometry=${minLon},${minLat},${maxLon},${maxLat}&geometryType=esriGeometryEnvelope&inSR=4326&spatialRel=esriSpatialRelIntersects&outFields=*&outSR=4326&f=json`;
      
      // Usamos proxy seguro para evitar el bloqueo CORS del navegador
      const urlFinal = "https://corsproxy.io/?" + encodeURIComponent(urlEnargas);

      try {
        const respuesta = await fetch(urlFinal);
        const datos = await respuesta.json();

        if (!datos.features || datos.features.length === 0) {
          contenedor.innerHTML = "<p style='text-align:center;'>No se encontraron estaciones oficiales de ENARGAS en la zona cercana.</p>";
          return;
        }

        let estaciones = datos.features.map(item => {
          // El servidor ArcGIS devuelve las coordenadas invertidas en .geometry (x = lon, y = lat)
          const latEstacion = item.geometry.y;
          const lonEstacion = item.geometry.x;
          const dist = calcularDistancia(latUser, lonUser, latEstacion, lonEstacion);

          const attrs = item.attributes;
          const nombre = attrs.RAZON_SOCI || attrs.BANDERA || "Estación GNC Oficial";
          const direccion = attrs.DIRECCION || "Dirección oficial ENARGAS";
          const localidad = attrs.LOCALIDAD || attrs.PARTIDO || "";

          return {
            nombre: nombre,
            direccion: `${direccion} (${localidad})`,
            lat: latEstacion,
            lon: lonEstacion,
            distancia: dist
          };
        });

        // Ordenar estrictamente por la menor distancia a tu GPS
        estaciones.sort((a, b) => a.distancia - b.distancia);

        contenedor.innerHTML = "";

        // Mostramos las estaciones oficiales más cercanas
        estaciones.slice(0, 10).forEach(est => {
          const urlWaze = `https://waze.com/ul?ll=${est.lat},${est.lon}&navigate=yes`;
          const urlMaps = `https://www.google.com/maps/search/?api=1&query=${est.lat},${est.lon}`;

          contenedor.innerHTML += `
            <div class="estacion">
              <h3>⛽ ${est.nombre}</h3>
              <p>📍 ${est.direccion}</p>
              <p class="distancia">📏 A ${est.distancia.toFixed(2)} km de tu posición</p>
              <div class="acciones">
                <a class="btn-nav btn-waze" href="${urlWaze}" target="_blank">🚙 Ir con Waze</a>
                <a class="btn-nav btn-maps" href="${urlMaps}" target="_blank">📍 Ir con Maps</a>
              </div>
            </div>
          `;
        });

      } catch (e) {
        contenedor.innerHTML = "<p style='text-align:center;'>Error al conectar con el servidor de ENARGAS. Reintentá en unos segundos.</p>";
      }
    }
  </script>
</body>
</html>
