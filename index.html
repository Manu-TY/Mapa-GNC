<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador GNC</title>
  <style>
    body { font-family: sans-serif; background: #f4f4f9; padding: 15px; margin: 0; }
    h1 { text-align: center; color: #1a365d; font-size: 1.3rem; margin-bottom: 15px; }
    .btn-buscar { display: block; width: 100%; padding: 15px; background: #0070f3; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
    .estacion { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .estacion h3 { margin: 0 0 5px 0; color: #1a365d; font-size: 1.1rem; }
    .estacion p { margin: 4px 0; color: #4a5568; font-size: 0.95rem; }
    .distancia { font-weight: bold; color: #e53e3e; }
    .acciones { display: flex; gap: 10px; margin-top: 12px; }
    .btn-nav { flex: 1; text-align: center; padding: 12px 0; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 0.95rem; }
    .btn-waze { background: #33ccff; color: #000; }
    .btn-maps { background: #ea4335; color: #fff; }
  </style>
</head>
<body>

  <h1>⛽ Estaciones de Servicio Cercanas</h1>
  <button class="btn-buscar" onclick="obtenerUbicacion()">🔍 Buscar Estaciones Cercanas</button>

  <div id="resultados"></div>

  <script>
    function obtenerUbicacion() {
      const contenedor = document.getElementById('resultados');
      contenedor.innerHTML = "<p style='text-align:center;'>Buscando tu posición GPS...</p>";

      if (!navigator.geolocation) {
        contenedor.innerHTML = "<p>Tu navegador no soporta geolocalización.</p>";
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          buscarEstaciones(pos.coords.latitude, pos.coords.longitude);
        },
        () => {
          contenedor.innerHTML = "<p style='text-align:center;'>Error al obtener GPS. Activa la ubicación en tu celular.</p>";
        }
      );
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    async function buscarEstaciones(latUser, lonUser) {
      const contenedor = document.getElementById('resultados');
      contenedor.innerHTML = "<p style='text-align:center;'>Consultando estaciones en la zona...</p>";

      // Trae todas las estaciones de servicio en 5km a la redonda
      const query = `[out:json];node["amenity"="fuel"](around:5000,${latUser},${lonUser});out;`;
      const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);

      try {
        const respuesta = await fetch(url);
        const datos = await respuesta.json();

        if (!datos.elements || datos.elements.length === 0) {
          contenedor.innerHTML = "<p style='text-align:center;'>No se encontraron estaciones en 5 km.</p>";
          return;
        }

        let estaciones = datos.elements.map(item => {
          const dist = calcularDistancia(latUser, lonUser, item.lat, item.lon);
          const nombre = item.tags.name || item.tags.brand || item.tags.operator || "Estación de Servicio";
          const calle = item.tags["addr:street"] ? `${item.tags["addr:street"]} ${item.tags["addr:housenumber"] || ""}` : "Ver ubicación en el mapa";

          return {
            nombre: nombre,
            direccion: calle,
            lat: item.lat,
            lon: item.lon,
            distancia: dist
          };
        });

        // Ordenar por cercanía GPS
        estaciones.sort((a, b) => a.distancia - b.distancia);

        contenedor.innerHTML = "";

        // Renderizar lista con botones dobles independientes
        estaciones.slice(0, 10).forEach(est => {
          const urlWaze = `https://waze.com/ul?ll=${est.lat},${est.lon}&navigate=yes`;
          const urlMaps = `https://www.google.com/maps/search/?api=1&query=${est.lat},${est.lon}`;

          contenedor.innerHTML += `
            <div class="estacion">
              <h3>⛽ ${est.nombre}</h3>
              <p>📍 ${est.direccion}</p>
              <p class="distancia">📏 A ${est.distancia.toFixed(2)} km de tu posición</p>
              <div class="acciones">
                <a class="btn-nav btn-waze" href="${urlWaze}" target="_blank">🚙 Ir con Waze</a>
                <a class="btn-nav btn-maps" href="${urlMaps}" target="_blank">📍 Ir con Maps</a>
              </div>
            </div>
          `;
        });

      } catch (e) {
        contenedor.innerHTML = "<p style='text-align:center;'>Error al obtener datos. Intentá de nuevo.</p>";
      }
    }
  </script>
</body>
</html>
