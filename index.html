<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de GNC</title>
  <style>
    body { font-family: sans-serif; background: #f4f4f9; padding: 20px; margin: 0; text-align: center; }
    h1 { color: #1a365d; font-size: 1.5rem; margin-bottom: 25px; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn { display: block; width: 100%; padding: 18px; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; text-decoration: none; cursor: pointer; box-sizing: border-box; margin-top: 12px; }
    .btn-waze { background: #33ccff; color: #000; }
    .btn-maps { background: #ea4335; color: white; }
    p { color: #4a5568; font-size: 1rem; line-height: 1.4; margin-bottom: 10px; }
  </style>
</head>
<body>

  <h1>⛽ Buscador de GNC Cercano</h1>

  <div class="card">
    <p>Tocá la aplicación con la que quieras navegar hacia las estaciones de GNC más cercanas a tu ubicación:</p>
    
    <!-- Botón Waze -->
    <a id="linkWaze" class="btn btn-waze" href="https://waze.com/ul?q=GNC&navigate=yes" target="_blank">🚙 Abrir en Waze</a>
    
    <!-- Botón Google Maps -->
    <a id="linkMaps" class="btn btn-maps" href="https://www.google.com/maps/search/estacion+de+servicio+gnc/" target="_blank">📍 Abrir en Google Maps</a>
  </div>

  <script>
    // Usa tu GPS para abrir el mapa justo en tu zona
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        document.getElementById('linkWaze').href = `https://waze.com/ul?ll=${lat},${lon}&q=GNC&navigate=yes`;
        document.getElementById('linkMaps').href = `https://www.google.com/maps/search/estacion+de+servicio+gnc/@${lat},${lon},14z`;
      });
    }
  </script>
</body>
</html>
